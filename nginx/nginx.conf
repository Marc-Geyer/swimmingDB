# --- TWO SEPARATE UPSTREAMS ---
upstream wsgi_backend {
    server web:8000;  # Gunicorn container (standard HTTP)
}

upstream asgi_backend {
    server websocket:8000;  # Daphne container (WebSockets)
}

server {
    listen 80;
    listen [::]:80;
    server_name ${APP_DOMAIN};

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }

    # Lets Encrypt challenge location
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
    listen 443 ssl;
    server_name ${APP_DOMAIN};
    server_tokens off;
    client_max_body_size 20M;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/${APP_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${APP_DOMAIN}/privkey.pem;
    
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # --- Static Files ---
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # --- WebSocket Support (Routes to ASGI/Daphne) ---
    location /ws/ {
        proxy_pass http://asgi_backend;  # ← Changed from django_upstream

        # WebSocket Headers (REQUIRED)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Url-Scheme $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-CSRFToken $http_x_csrftoken;
        proxy_redirect off;

        # Long timeouts for persistent connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # --- Regular HTTP Requests (Routes to WSGI/Gunicorn) ---
    location / {
        proxy_pass http://wsgi_backend;  # ← Changed from django_upstream

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host:$server_port;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Url-Scheme $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-CSRFToken $http_x_csrftoken;
        proxy_redirect off;

        proxy_cookie_path / /;
    }
}
