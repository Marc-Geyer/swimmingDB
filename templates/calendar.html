{% extends "base.html" %}
{% load static %}
{% load i18n %}

{% block title %}{% trans "Calendar"%}{% endblock %}

{% block content %}
  <h1>{% trans "Training Calendar"%}</h1>

  <!-- Container for FullCalendar -->
  <div id="calendar" style="max-width: 1100px; margin: 20px auto;"></div>

  <!-- Load FullCalendar JS -->
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.js'></script>

  <!-- Modal Structure -->
  <div class="modal fade" id="eventModal" tabindex="-1" aria-labelledby="eventModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="eventModalLabel">Event Details</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body" id="eventModalBody">
          <!-- Content injected via JS -->
          <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
        </div>
        <div class="modal-footer" id="eventModalFooter">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          <!-- Dynamic Action Button (e.g., "Create Session") -->
          <button type="button" class="btn btn-primary d-none" id="eventActionBtn">Action</button>
        </div>
      </div>
    </div>

  <script>
    const DATA_URL = '{% url "swimpro:calendar_data" %}'
    const WS_URL = `ws://${window.location.host}/ws/calendar/`
  </script>

  <script src="{% static 'js/calendar.js' %}"></script>
{% endblock %}
