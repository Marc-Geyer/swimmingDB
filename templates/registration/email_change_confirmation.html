{% extends "base.html" %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow border-0 text-center p-4">
        <div class="mb-4">
          <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="currentColor" class="bi bi-envelope-check text-primary" viewBox="0 0 16 16">
            <path d="M2 2a2 2 0 0 0-2 2v8.01A2 2 0 0 0 2 14h5.5a.5.5 0 0 0 0-1H2a1 1 0 0 1-.966-.741l5.64-3.471L8 9.583l7-4.2V8.5a.5.5 0 0 0 1 0V4a2 2 0 0 0-2-2H2zm3.708 6.208L.432 2.256A1.99 1.99 0 0 1 2 2h12a1.99 1.99 0 0 1 1.568.256L8.708 8.208a1 1 0 0 1-1.414 0z"/>
            <path d="M10.854 7.146a.5.5 0 0 1 0 .708l-3 3a.5.5 0 0 1-.708 0l-1.5-1.5a.5.5 0 1 1 .708-.708L7.5 9.793l2.646-2.647a.5.5 0 0 1 .708 0z"/>
          </svg>
        </div>
        <h3>Check Your Email</h3>
        <p class="text-muted">We've sent a verification link to:</p>
        <h5 class="text-primary">{{ pending_email }}</h5>
        <p class="small text-muted mt-3">
          The link will expire in 24 hours. If you don't see the email, check your spam folder.
        </p>
        <div class="mt-4">
          <a href="{% url 'auth:settings' %}" class="btn btn-outline-primary">Return to Settings</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
