{% extends "base.html" %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow border-0">
        <div class="card-body p-4">
          <h3 class="text-center mb-4">Change Username</h3>

          {% if messages %}
          {% for message in messages %}
          <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
          {% endfor %}
          {% endif %}

          <form method="post" novalidate>
            {% csrf_token %}

            <div class="mb-3">
              <label for="username" class="form-label">New Username</label>
              <input type="text" name="username" class="form-control"
                     value="{{ user.username }}" placeholder="Enter new username" required>
              <small class="form-text text-muted">
                3+ characters, letters, numbers, and @/./+/-/_ only.
              </small>
            </div>

            <div class="d-grid gap-2 mt-4">
              <button type="submit" class="btn btn-primary">Update Username</button>
              <a href="{% url 'auth:settings' %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
